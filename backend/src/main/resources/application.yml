server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

# JWT設定
jwt:
  secret: dev-secret-key-for-signing-jwt-tokens-min-256-bits-long-enough
  expiration-seconds: 900
  issuer: auth-server

# リフレッシュトークン設定
rt:
  expiration-seconds: 28800

# Entra ID設定
entra:
  tenant-id: d5d48991-b228-4abb-a3fc-0e39ef6bbea6  # Azure Portalから取得
  client-id: 5ac00f7c-47ef-4242-a36b-0bc2949de139  # Azure Portalから取得
  issuer: https://login.microsoftonline.com/d5d48991-b228-4abb-a3fc-0e39ef6bbea6/v2.0
  jwks-uri: https://login.microsoftonline.com/d5d48991-b228-4abb-a3fc-0e39ef6bbea6/discovery/v2.0/keys

# スタブ設定
stub:
  enabled: false
  entra:
    issuer: https://stub.login.microsoftonline.com/stub-tenant/v2.0
    client-id: stub-client-id

# CORS設定
cors:
  allowed-origins: http://localhost:4200

# ログ設定
logging:
  level:
    com.auth.app: DEBUG
    org.springframework.security: DEBUG
  file:
    name: ${user.dir}/logs/auth-app.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      file-name-pattern: ${user.dir}/logs/auth-app.%d{yyyy-MM-dd}.%i.log
